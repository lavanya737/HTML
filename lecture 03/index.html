<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- semantic -meaning(header,nav,main,footer,aside)
     non semantic-no meaning(div) -->
     <header>
        <nav>
            navbar
        </nav>
     </header>
     <aside>
        sidebar
     </aside>
     <main>
        <p>
            <em>Lorem ipsum dolor sit</em> <b>amet consectetur</b> <strong>adipisicing elit</strong>. <i>Illum, quia.</i>
        </p>
        <!-- b is non semantic and strong is semantic -->
         <!-- i is non semantic and em (emphasis) is semantic -->
          <p>
            <del>Lorem ipsum</del> <ins>dolor sit </ins><sub>amet consectetur adipisicing elit.</sub> <sup>Itaque, incidunt.</sup>
          </p>
          <!-- pixel yeh vo for images -->
           <img src="static/images/wow.jpg" alt="girl holding flowers" width="700"/>
           <hr>
           <ul>
            <li>Item 1</li>
            <li>Item 2</li>
            <li>Item 3</li>
           </ul>
           <ol type="a"> 
            <li>Item 1</li>
            <li>Item 2</li>
            <li>Item 3</li>
<!-- type is used for numbering in diff ways like numbers,alphabets,romans etc -->
           </ol>

           <dl>
            <dt>item</dt>
             <dd>-item definition</dd>
            </dl>

     </main>
</body>
</html>
